<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginal — Distribution of Income & Wealth</title>
<meta name="description" content="Mastery practice for HSC Economics: flashcards, short answers and AI-marked extended responses.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3F5; --card:#FFFFFF;
    --ink:#3C4A4A; --ink-2:#7A8A88; --ink-3:#AEBAB8;
    --green:#1CC47D; --green-dk:#14A368; --green-soft:#E4F9EF;
    --blue:#1CA0F2; --blue-dk:#1487D6; --blue-soft:#E2F3FE;
    --gold:#FFB323; --gold-dk:#E89400; --gold-soft:#FFF3D8;
    --coral:#FF7C6B; --coral-dk:#EE5946; --coral-soft:#FFE8E4;
    --line:#E7EDED;
    --disp:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.disp{font-family:var(--disp);letter-spacing:-.01em}
  button{font:inherit;cursor:pointer}
  ::selection{background:var(--green-soft)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  header{display:flex;align-items:center;gap:12px;padding:16px clamp(16px,4vw,32px);background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:600;font-size:20px}
  .mk{width:28px;height:28px;border-radius:9px;background:var(--green);position:relative;flex:none;box-shadow:0 3px 0 var(--green-dk)}
  .mk::after{content:"";position:absolute;left:7px;right:7px;bottom:6px;height:3px;border-radius:2px;background:#fff}
  .mk::before{content:"";position:absolute;left:7px;bottom:6px;width:3px;height:14px;border-radius:2px;background:rgba(255,255,255,.9)}
  .unit{font-size:13px;color:var(--ink-2);font-weight:700;margin-left:auto;text-align:right}

  main{max-width:1180px;margin:0 auto;padding:28px clamp(16px,4vw,40px) 90px}

  .hi{font-family:var(--disp);font-weight:600;font-size:24px}
  .hi-s{color:var(--ink-2);font-weight:700;font-size:14px;margin:2px 0 20px}

  .areas{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .area{display:flex;gap:14px;align-items:center;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;transition:transform .12s,box-shadow .12s}
  .setwrap{display:flex;align-items:stretch;gap:8px}
  .setwrap .area{flex:1;min-width:0}
  .setwrap .setrm{flex:none;align-self:stretch}
  .area:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(60,74,74,.1)}
  .area:focus-visible{outline:3px solid var(--green)}
  .aicon{font-size:28px;flex:none;width:52px;height:52px;display:grid;place-items:center;background:var(--green-soft);border-radius:14px}
  .ainfo{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .aname{font-family:var(--disp);font-weight:600;font-size:16px}
  .ablurb{font-size:12.5px;color:var(--ink-2);font-weight:700}
  .abar{height:8px;border-radius:99px;background:#EDF2F2;overflow:hidden;margin-top:4px}
  .abar i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .4s}
  .ameta{font-size:12px;color:var(--ink-3);font-weight:800}

  .settings{margin-top:26px;font-size:14px}
  .settings details{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 18px}
  .settings summary{font-family:var(--disp);font-weight:600;cursor:pointer}
  .settings p{color:var(--ink-2);font-weight:600;margin:10px 0}
  .settings input{width:100%;max-width:440px;font:inherit;font-weight:600;border:2px solid var(--line);border-radius:12px;padding:10px 13px;margin:0 8px 8px 0}
  .settings code{background:var(--bg);padding:1px 6px;border-radius:6px}

  .btn{font-family:var(--disp);font-weight:600;font-size:15px;color:#fff;background:var(--green);border:none;border-radius:14px;padding:12px 24px;box-shadow:0 4px 0 var(--green-dk);transition:transform .08s}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-dk)}
  .btn:disabled{opacity:.6}
  .btn.ghost{background:var(--card);color:var(--ink);box-shadow:0 0 0 2px var(--line) inset}
  .btn.sm{padding:9px 17px;font-size:14px;border-radius:12px;box-shadow:0 3px 0 var(--green-dk)}
  .btn.sm.ghost{box-shadow:0 0 0 2px var(--line) inset}

  .sessionbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .x{background:none;border:none;font-size:20px;color:var(--ink-2);padding:4px 8px;border-radius:10px}
  .x:hover{background:var(--card)}
  .sessionbar .lbl{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--ink-2);flex:none}
  .ordtoggle{flex:none;font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--ink-2);background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:5px 12px;cursor:pointer}
  .ordtoggle:hover{border-color:var(--green)}
  .sbar{flex:1;height:11px;background:#E2EAEA;border-radius:99px;overflow:hidden}
  .sbar i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .3s}

  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-family:var(--disp);font-weight:500;font-size:12.5px;padding:5px 11px;border-radius:9px}
  .tag.blue{background:var(--blue-soft);color:var(--blue-dk)} .tag.gold{background:var(--gold-soft);color:var(--gold-dk)} .tag.gray{background:#E8EEEE;color:var(--ink-2)}

  .prompt{font-family:var(--disp);font-weight:500;font-size:21px;line-height:1.35;margin-bottom:16px}
  .scaffold{background:var(--blue-soft);border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:14px}
  .scaffold summary{font-family:var(--disp);font-weight:600;color:var(--blue-dk);cursor:pointer}
  .scaffold ol{margin:8px 0 4px 20px}
  .scaffold li{margin-bottom:4px;font-weight:600;color:#36678c}

  .choices{display:grid;gap:10px}
  .choice{text-align:left;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px 16px;font-weight:700;font-size:15px;transition:border-color .12s,transform .12s}
  .choice:hover{border-color:var(--green);transform:translateY(-1px)}
  .choice.right{border-color:var(--green);background:var(--green-soft)}
  .choice.wrong{border-color:var(--coral);background:var(--coral-soft)}

  .answerbox{width:100%;font:inherit;font-weight:600;font-size:15.5px;line-height:1.65;color:var(--ink);background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px 16px;resize:vertical}
  .answerbox:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .calcin{font:inherit;font-weight:700;font-size:17px;border:2px solid var(--line);border-radius:14px;padding:12px 16px;width:min(280px,100%)}
  .calcin:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .row{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap}
  .row.center{justify-content:center}
  .hint{font-size:13px;color:var(--ink-3);font-weight:700}

  .sheet{margin-top:18px;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:var(--card);animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}}
  .sheet .head{display:flex;align-items:center;gap:14px;padding:16px 20px}
  .sheet.great .head{background:var(--green-soft)} .sheet.good .head{background:var(--green-soft)}
  .sheet.mid .head{background:var(--gold-soft)} .sheet.low .head{background:var(--coral-soft)}
  .sheet h3{font-size:18px;font-weight:600}
  .score{font-family:var(--disp);font-weight:700;font-size:26px;flex:none}
  .score small{font-size:15px;color:var(--ink-2);font-weight:600}
  .sheet .bd{padding:16px 20px}
  .sheet .bd p{font-size:15px;margin-bottom:10px}
  .working{background:var(--bg);border-radius:12px;padding:10px 14px;font-size:14px!important}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 12px}
  .chip{font-family:var(--disp);font-weight:500;font-size:12.5px;padding:5px 11px;border-radius:9px;background:var(--green-soft);color:var(--green-dk)}
  .chip.todo{background:#fff;color:var(--ink-2);box-shadow:0 0 0 1.5px var(--line) inset;cursor:pointer}
  .crit{font-size:14px;margin-bottom:7px;display:flex;gap:9px;align-items:baseline}
  .crit .dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--ink-3);transform:translateY(-1px)}
  .crit.met .dot{background:var(--green)} .crit.partial .dot{background:var(--gold)} .crit.missing .dot{background:var(--coral)}
  .next{color:var(--blue-dk);font-weight:700}
  .sheet details{margin:8px 0}
  .sheet summary{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--blue-dk);cursor:pointer}
  .sheet .actions{display:flex;justify-content:flex-end;margin-top:8px}

  .summary{text-align:center;padding:40px 0}
  .bigscore{font-family:var(--disp);font-weight:700;font-size:54px;color:var(--green-dk)}
  .bigscore small{font-size:24px;color:var(--ink-2)}
  .summary h2{font-size:22px;margin:6px 0 10px}
  .summary p{color:var(--ink-2);font-weight:700;max-width:46ch;margin:0 auto 22px}

  .term{color:var(--blue-dk);font-weight:800;border-bottom:2px dotted var(--blue);cursor:pointer}
  .pop{position:absolute;z-index:50;max-width:300px;background:var(--ink);color:#EFF5F5;border-radius:14px;padding:12px 15px;font-size:13.5px;box-shadow:0 12px 30px rgba(27,42,41,.3)}
  .pop b{font-family:var(--disp);display:block;margin-bottom:3px;color:#fff;text-transform:capitalize}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:99px;z-index:60}

  .nav{display:flex;gap:6px;background:#E2EAEA;border-radius:99px;padding:5px;width:max-content;margin-bottom:20px}
  .navtab{font-family:var(--disp);font-weight:600;font-size:14px;border:none;background:none;color:var(--ink-2);padding:8px 22px;border-radius:99px}
  .navtab.on{background:var(--card);color:var(--green-dk);box-shadow:0 1px 4px rgba(60,74,74,.12)}
  .bcard{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
  .blabel{display:block;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink-2);margin:10px 0 5px}
  .binput{width:100%;font:inherit;font-weight:600;font-size:14.5px;color:var(--ink);border:2px solid var(--line);border-radius:12px;padding:10px 13px;background:#FBFDFD}
  .binput:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .binput.mono{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;font-weight:500}
  textarea.binput{resize:vertical}
  select.binput{appearance:auto}
  .brow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .brow.between{justify-content:space-between;align-items:center}
  .optrow{align-items:center;margin-bottom:8px}
  .optrow input[type=radio]{width:18px;height:18px;accent-color:var(--green);flex:none}
  .bh{font-size:16px;font-weight:600}
  .bhint{font-size:13.5px;color:var(--ink-2);font-weight:600;margin:6px 0 10px}
  .setlist{margin-top:14px}
  .setrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:14px;font-weight:600;flex-wrap:wrap}
  .setrow small{color:var(--ink-3)}
  .btn.danger{color:var(--coral-dk)}

  /* ---- auth (sign in / set password) ---- */
  .authgate{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:24px 0}
  .authbrand{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--green-dk);text-align:center;margin-bottom:8px}
  .authcard{max-width:420px;margin:8px auto 0;background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:22px}
  .authgate .authcard{margin:0;width:100%;box-shadow:0 12px 40px rgba(60,74,74,.12)}
  .authcard h2{font-family:var(--disp);font-size:20px;margin:0 0 4px}
  .authcard .bhint{margin:2px 0 14px}
  .authfield{margin-bottom:12px}
  .authfield label{display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:4px}
  .authfield input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit}
  .authfield input:focus{outline:none;border-color:var(--green)}
  .authmsg{font-size:13.5px;font-weight:600;margin-top:10px;min-height:18px}
  .authmsg.err{color:var(--coral-dk)}
  .authmsg.ok{color:var(--green-dk)}
  .authlink{background:none;border:none;color:var(--green-dk);font-weight:700;font-size:13.5px;cursor:pointer;padding:0;text-decoration:underline}
  .whoami{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:var(--ink-2)}

  /* ---- sets manager (compact list) ---- */
  .setsmgr{margin-top:24px}
  .setshead{font-family:var(--disp);font-weight:600;font-size:16px;margin-bottom:2px}
  .setshead small{color:var(--ink-3);font-weight:600}
  .smbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0 10px}
  .sminput{flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit}
  .sminput:focus{outline:none;border-color:var(--green)}
  .smsort{padding:9px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:13.5px;font-family:inherit;font-weight:600;background:var(--card)}
  .smtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .tagchip{font-size:12px;font-weight:700;color:var(--ink-2);background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:4px 11px;cursor:pointer}
  .tagchip.on{background:var(--green-soft);border-color:var(--green);color:var(--green-dk)}
  .smscroll{max-height:430px;overflow-y:auto;border:1.5px solid var(--line);border-radius:14px;background:var(--card)}
  .smrow{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:11px 14px;border-top:1px solid var(--line)}
  .smrow:first-child{border-top:none}
  .smname{font-family:var(--disp);font-weight:600;font-size:15px;cursor:pointer;min-width:0}
  .smname:hover{color:var(--green-dk)}
  .smmeta{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px}
  .smsettags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .smsettag{font-size:11px;font-weight:700;color:var(--ink-2);background:var(--green-soft);border-radius:99px;padding:2px 8px}
  .smcount{font-size:12.5px;font-weight:700;color:var(--ink-2);white-space:nowrap}
  .smacts{display:flex;gap:6px;flex:none}
  .smempty{padding:26px 14px;text-align:center;color:var(--ink-3);font-weight:600;font-size:14px}

  .modes{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:6px}
  .mode{display:flex;flex-direction:column;gap:3px;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:16px;transition:transform .12s,border-color .12s}
  .mode:hover:not(:disabled){transform:translateY(-2px);border-color:var(--green)}
  .mode:disabled{opacity:.45}
  .mname{font-family:var(--disp);font-weight:600;font-size:16px}
  .mdesc{font-size:12.5px;color:var(--ink-2);font-weight:700}
  .mcount{font-family:var(--disp);font-weight:600;font-size:12px;color:var(--green-dk);margin-top:4px}
  .hintrow{margin-bottom:12px}
  .hintbtn{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--gold-dk);background:none;border:none;padding:4px 0}
  .hintbox{background:var(--gold-soft);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:600;color:#7d5d12;animation:pop .2s ease}
  .flashface{background:var(--card);border:2px dashed var(--line);border-radius:18px;padding:26px;text-align:center}
  .flashprompt{color:var(--ink-2);font-weight:700;font-size:14.5px;margin-bottom:14px}
  .flashanswer{background:var(--card);border:2px solid var(--green);border-radius:18px;padding:20px;animation:pop .25s ease}
  .flashanswer p{font-size:15.5px;margin-bottom:8px}
  .raterow{display:flex;gap:10px;flex-wrap:wrap}
  .btn.rate{flex:1;min-width:100px}
  .btn.rate.low{background:var(--coral);box-shadow:0 4px 0 var(--coral-dk)}
  .btn.rate.mid{background:var(--gold);box-shadow:0 4px 0 var(--gold-dk)}
  .btn.rate.high{background:var(--green);box-shadow:0 4px 0 var(--green-dk)}
  .ctx{margin:10px 0;background:var(--blue-soft);border-radius:12px;padding:10px 14px}
  .ctx summary{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--blue-dk);cursor:pointer}
  .ctx p{margin-top:8px;font-size:14.5px;color:#2d5876}

  .flipwrap{perspective:850px;-webkit-perspective:850px;perspective-origin:center;-webkit-perspective-origin:center}
  .flipcard{position:relative;min-height:250px;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:-webkit-transform .85s cubic-bezier(.35,.65,.25,1),transform .85s cubic-bezier(.35,.65,.25,1);will-change:transform;-webkit-transform:translateZ(0);transform:translateZ(0)}
  .flipcard.flipped{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
  .flipwrap.lifting{animation:cardlift .85s cubic-bezier(.35,.65,.25,1)}
  @keyframes cardlift{0%{transform:scale(1)}45%{transform:scale(1.045) translateY(-8px);filter:drop-shadow(0 22px 26px rgba(60,74,74,.22))}100%{transform:scale(1)}}
  .face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;background:var(--card)}
  .face.front{z-index:2}
  .face.back{z-index:1}
  .flipcta{display:inline-flex;align-items:center;gap:9px;font-size:16px;padding:13px 28px}
  .flipcta svg{flex:none}
  .face.front{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:safe center;gap:16px;border:2px dashed var(--line);padding:26px;text-align:center;cursor:pointer;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .face.front:hover{border-color:var(--green)}
  .face.front:focus-visible{outline:3px solid var(--green)}
  .fprompt{font-family:var(--disp);font-weight:500;font-size:calc(18px * var(--card-scale));line-height:1.4}
  .fliphint{font-size:13px;color:var(--ink-3);font-weight:800}
  .face.back{-webkit-transform:rotateY(180deg);transform:rotateY(180deg);border:2px solid var(--green);padding:18px 20px;min-height:240px;max-height:78vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .backtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .flipback{font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--ink-2);background:var(--bg);border:none;border-radius:99px;padding:6px 12px}
  .fans{font-size:calc(16px * var(--card-scale));line-height:1.6;margin-bottom:8px}
  @media(prefers-reduced-motion:reduce){.flipcard{transition:none}.flipwrap.lifting{animation:none}}

  /* Single source of truth for card text size (Small/Medium/Large/XL). Only
     .fprompt + .fans read --card-scale, so app chrome never rescales. Default
     = Medium = a comfortable, slightly enlarged size. */
  :root{--card-scale:1.15}
  .cardsize{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 12px}
  .cslabel{font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--ink-2)}
  .csbtn{font-family:var(--disp);font-weight:700;color:var(--ink-2);background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;min-height:44px;min-width:44px;cursor:pointer;line-height:1}
  .csbtn:hover{border-color:var(--green)}
  .csbtn.on{background:var(--green-soft);border-color:var(--green);color:var(--green-dk)}
  .csbtn[data-scale="s"]{font-size:13px}
  .csbtn[data-scale="m"]{font-size:15px}
  .csbtn[data-scale="l"]{font-size:17px}
  .csbtn[data-scale="xl"]{font-size:19px}

  .stimulus{background:#FFFDF6;border:1.5px solid var(--gold);border-radius:14px;padding:12px 16px;margin-bottom:14px}
  .stimlabel{font-family:var(--disp);font-weight:600;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-dk);margin-bottom:6px}

  .flipcard.flyright{animation:flyR .24s ease-in forwards}
  .flipcard.flyleft{animation:flyL .24s ease-in forwards}
  .flipcard.flydown{animation:flyD .24s ease-in forwards}
  @keyframes flyR{to{transform:rotateY(180deg) translateX(-120%) rotate(-8deg);opacity:0}}
  @keyframes flyL{to{transform:rotateY(180deg) translateX(120%) rotate(8deg);opacity:0}}

  .flipcard{touch-action:pan-y}

  /* Smartboard / embedded-WebKit fallback: when 3D transforms aren't supported,
     the rotateY flip would snap. Crossfade the front out to reveal the back so
     the card still VISIBLY animates. Back stays in flow so the card still grows.
     Placed AFTER the global .fly* rules so the fade2d override actually wins. */
  @supports not ((transform-style:preserve-3d) or (-webkit-transform-style:preserve-3d)){
    .flipcard{transition:none}
    .flipcard.flipped{-webkit-transform:none;transform:none}
    .face.back{-webkit-transform:none;transform:none}
    .face.front{transition:opacity .4s ease}
    .flipcard.flipped .face.front{opacity:0;pointer-events:none}
    .flipcard.flyright,.flipcard.flyleft,.flipcard.flydown{animation:fade2d .24s ease-in forwards}
    @keyframes fade2d{to{opacity:0}}
  }

  @keyframes iconnudge{0%,86%,100%{transform:rotate(0)}93%{transform:rotate(180deg)}}

  @media(prefers-reduced-motion:reduce){.flipcta svg,.flipback svg{animation:none!important;transition:none!important}}

  .rv-ctxstem{font-size:17px;line-height:1.7;color:var(--ink);font-weight:600;margin-bottom:14px}
  .rv-ctxmeta{display:flex;gap:8px;flex-wrap:wrap}
  .rv-ctxpill{font-family:var(--disp);font-weight:600;font-size:12.5px;background:var(--blue-soft);color:var(--blue-dk);padding:4px 12px;border-radius:9px}
  .rv-ctxnote{font-size:13.5px;color:var(--ink);line-height:1.6;margin-top:12px}
  @media(max-width:680px){.rv-cols{grid-template-columns:1fr}.rv-left{border-right:none;border-bottom:1.5px solid var(--line);display:flex;gap:8px;overflow-x:auto}.rv-right{padding:22px 18px}}

  /* paragraph default view: severity spans, missing chips, status list */
  .rv-span{cursor:pointer;border-radius:4px;padding:0 2px;text-decoration:underline;text-decoration-thickness:2.5px;text-underline-offset:3px}
  .rv-span.good{text-decoration-color:var(--green)}
  .rv-span.weak{text-decoration-color:var(--gold-dk)}
  .rv-span.crit{text-decoration-color:var(--coral-dk)}
  .rv-span.opt{text-decoration-style:dotted;text-decoration-color:var(--blue)}
  .rv-span.skipped{text-decoration-style:dotted}
  .rv-span:hover{background:var(--bg)}
  .rv-misschip{display:inline-flex;align-items:center;gap:7px;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink);background:#fff;border:1.5px solid var(--gold-dk);border-radius:11px;padding:6px 13px;margin-left:6px;cursor:pointer;vertical-align:2px;box-shadow:0 2px 0 var(--gold-dk)}
  .rv-misschip:hover{background:var(--gold-soft)}
  .rv-misschip.crit{border-color:var(--coral-dk);box-shadow:0 2px 0 var(--coral-dk)}
  .rv-misschip.crit .rv-missx{background:var(--coral-dk)}
  .rv-misschip.crit:hover{background:var(--coral-soft)}
  .rv-misschip:active{transform:translateY(1px);box-shadow:none}
  .rv-missx{display:inline-grid;place-items:center;width:17px;height:17px;border-radius:50%;background:var(--gold-dk);color:#fff;font-size:11px;font-weight:800;flex:none}
  .rv-scorecard{margin-top:16px;border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;background:#fff}
  .rv-screasons{margin-top:6px}
  .rv-statusrow{width:100%;display:flex;align-items:center;gap:11px;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-family:var(--body)}
  .rv-statusrow:hover{border-color:var(--ink-3)}
  .rv-strdot{flex:none;width:11px;height:11px;border-radius:50%}
  .rv-strdot.critical{background:var(--coral)} .rv-strdot.should{background:var(--gold)} .rv-strdot.optional{background:var(--blue)}
  .rv-strtext{flex:1;font-size:14.5px;font-weight:600;color:var(--ink)}
  .rv-statusrow.done .rv-strtext{color:var(--ink-2)}
  .rv-stbadge{flex:none;font-family:var(--disp);font-weight:600;font-size:11.5px;padding:3px 10px;border-radius:8px;color:#fff}
  .rv-stbadge.open.critical{background:var(--coral)} .rv-stbadge.open.should{background:var(--gold-dk)} .rv-stbadge.open.optional{background:var(--blue)}
  .rv-stbadge.done{background:var(--green)}
  .rv-stbadge.skip{background:var(--ink-3)}

  /* issue walkthrough (navigation skeleton; ladders + practice land in step 5) */
  .rv-focusbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
  .rv-backbtn{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--blue-dk);background:#fff;border:1.5px solid var(--blue);border-radius:10px;cursor:pointer;padding:7px 14px}
  .rv-backbtn:hover{background:var(--blue-soft)}
  .rv-focusprog{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink-2)}
  .rv-chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .rv-ichip{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink-2);display:grid;place-items:center}
  .rv-ichip.critical{border-color:var(--coral)} .rv-ichip.should{border-color:var(--gold)} .rv-ichip.optional{border-color:var(--blue)}
  .rv-ichip.done{background:var(--green);color:#fff;border-color:var(--green)}
  .rv-ichip.skip{background:var(--bg);color:var(--ink-3)}
  .rv-ichip.cur{box-shadow:0 0 0 3px var(--blue-soft);border-color:var(--blue)}
  .rv-issuecard{border:2px solid var(--blue);border-radius:16px;padding:16px 18px;background:#fff}
  .rv-issuecard.sev-critical{border-color:var(--coral-dk)} .rv-issuecard.sev-should{border-color:var(--gold-dk)} .rv-issuecard.sev-optional{border-color:var(--blue)}
  .rv-issuehead{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .rv-sevtag{font-family:var(--disp);font-weight:600;font-size:11px;color:#fff;padding:3px 11px;border-radius:8px}
  .rv-sevtag.critical{background:var(--coral-dk)} .rv-sevtag.should{background:var(--gold-dk)} .rv-sevtag.optional{background:var(--blue)}
  .rv-subprog{font-size:12px;color:var(--ink-2);font-weight:700}
  .rv-origtag{display:inline-block;font-size:12.5px;color:var(--ink-2);font-weight:700;margin-bottom:8px}
  .rv-origline{font-size:16.5px;line-height:1.7;color:var(--ink);font-weight:600;background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:12px 15px;margin-bottom:13px}
  .rv-issuetitle{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--ink);margin-bottom:6px}
  .rv-issuewhy{font-size:16px;line-height:1.65;color:var(--ink);font-weight:600;margin-bottom:15px}
  .rv-issuebtns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .rv-skipbtn{color:var(--ink-2)}

  /* step 8: charting module (Lorenz + Gini), reused from the verified prototype */
  .lzwrap{position:relative;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:10px;margin-bottom:12px}
  .lzcap{font-size:13px;font-weight:700;color:var(--ink);margin:2px 4px 8px}
  .lzexpand{position:absolute;top:12px;right:12px;font-family:var(--disp);font-weight:600;font-size:12px;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:5px 10px;cursor:pointer;color:var(--ink-2)}
  .lzexpand:hover{border-color:var(--blue);color:var(--blue-dk)}
  .lzsvg{width:100%;max-width:460px;height:auto;display:block;margin:0 auto}
  .lzsvg-big{max-width:620px}
  .lzgrid{stroke:var(--line);stroke-width:1}
  .lzaxis{stroke:var(--ink-3);stroke-width:1.5}
  .lzaxlab{font-family:var(--body);font-weight:700;font-size:12px;fill:var(--ink-2)}
  .lzaxnum{font-family:var(--body);font-weight:700;font-size:10.5px;fill:var(--ink-3)}
  .lztitle{font-family:var(--disp);font-weight:600;font-size:15px;fill:var(--ink)}
  .lzeq{stroke:var(--ink-3);stroke-width:2;stroke-dasharray:5 5;fill:none}
  .lzgross{stroke:var(--coral);stroke-width:3;fill:none;stroke-linejoin:round}
  .lzdisp{stroke:var(--green);stroke-width:3;fill:none;stroke-linejoin:round}
  .lzwealth{stroke:var(--gold-dk);stroke-width:3;fill:none;stroke-linejoin:round}
  .lzgap{fill:var(--green-soft);opacity:.55}
  .lzleglab{font-family:var(--body);font-weight:700;font-size:11.5px;fill:var(--ink)}
  .lzpoi{cursor:pointer}
  .lzpoidot{fill:var(--blue)}
  .lzpoiring{fill:none;stroke:var(--blue);stroke-width:2;opacity:.35}
  .lzpoi:hover .lzpoiring{opacity:.9;stroke:var(--blue-dk)}
  .lzexplain{margin-top:12px;background:var(--bg);border-radius:12px;padding:13px 15px;min-height:54px}
  .lzhint{font-size:13px;color:var(--ink-2);font-weight:700}
  .lzexp-t{font-family:var(--disp);font-weight:600;font-size:14.5px;color:var(--blue-dk);margin-bottom:4px}
  .lzexp-b{font-size:13.5px;line-height:1.6;color:var(--ink)}
  .lzbigscrim{position:fixed;inset:0;background:rgba(28,40,40,.6);display:none;align-items:center;justify-content:center;z-index:140;padding:24px}
  .lzbigscrim.show{display:flex}
  .lzbigcard{position:relative;background:#fff;border-radius:20px;max-width:1000px;width:100%;max-height:88vh;overflow:auto;padding:26px}
  .lzbiggrid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
  @media(max-width:760px){.lzbiggrid{grid-template-columns:1fr}}
  .lzbigside{background:var(--bg);border-radius:14px;padding:16px 18px}
  /* income-source bar */
  .srcbar{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .srcrow{display:grid;grid-template-columns:150px 1fr 46px;align-items:center;gap:10px}
  .srclab{font-size:13px;font-weight:700;color:var(--ink);text-align:right}
  .srctrack{display:block;height:20px;background:var(--bg);border-radius:6px;overflow:hidden}
  .srcfill{display:block;height:100%;border-radius:6px;background:var(--blue);min-width:2px}
  .srcpct{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink)}
  /* Gini "how it's built" tool */
  .giniA{fill:var(--coral);opacity:.32} .giniB{fill:var(--blue);opacity:.16}
  .ginilbl{font-family:var(--disp);font-weight:600;font-size:20px} .ginilblA{fill:var(--coral-dk)} .ginilblB{fill:var(--blue-dk)}
  .ginihead{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px}
  .giniframe{font-size:12.5px;line-height:1.55;color:var(--ink);background:var(--blue-soft);border-radius:10px;padding:9px 11px;margin:0 0 12px}
  .giniframe b{color:var(--blue-dk);font-weight:800}
  .ginicurvesel{display:flex;gap:6px;margin-bottom:10px}
  .ginicurvesel button{flex:1;font-family:var(--disp);font-weight:600;font-size:13px;border:1.5px solid var(--line);border-radius:10px;padding:7px;background:#fff;cursor:pointer;color:var(--ink-2)}
  .ginicurvesel button.on{border-color:var(--blue);background:var(--blue-soft);color:var(--blue-dk)}
  .ginistepnote{font-size:13px;color:var(--ink);font-weight:500;margin:0 0 10px}
  .ginistep{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;line-height:1.5;color:var(--ink-2);padding:8px 0;border-top:1px solid var(--line)}
  .ginistep.on{color:var(--ink)}
  .ginistep .gn{flex:none;width:20px;height:20px;border-radius:50%;background:var(--ink-3);color:#fff;font-family:var(--disp);font-weight:600;font-size:11px;display:grid;place-items:center}
  .ginistep.on .gn{background:var(--blue)}
  .ginival{font-family:var(--disp);font-weight:600;color:var(--blue-dk)} .ginival.big{font-size:17px}
  .ginidone{font-size:13px;line-height:1.55;color:var(--ink);background:var(--green-soft);border-radius:10px;padding:10px 12px;margin:8px 0 0}
  /* ===== long-answer question page (toned-down: white/grey, green submit only) ===== */
  .qmeta{font-family:var(--disp);font-weight:500;font-size:12.5px;color:var(--ink-3);margin:0 0 8px}
  .qcard{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .qprompt{font-family:var(--disp);font-weight:500;font-size:20px;line-height:1.45;color:var(--ink)}
  .qtoggles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .qtoggle{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .qtoggle:hover{border-color:var(--ink-3)}
  .qtoggle .ti{color:var(--ink-3);font-style:normal}
  .qtoggle.on-source{border-color:var(--blue);color:var(--blue-dk)} .qtoggle.on-source .ti{color:var(--blue)}
  .qtoggle.on-help{border-color:var(--gold-dk);color:var(--gold-dk)} .qtoggle.on-help .ti{color:var(--gold-dk)}
  /* help panel: scaffold + hint under one roof */
  .helppanel{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:18px}
  .helpsec{margin-bottom:14px} .helpsec:last-child{margin-bottom:0}
  .helph{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--ink-2);margin-bottom:8px}
  .helpol{margin:0 0 0 18px;padding:0} .helpol li{font-size:14.5px;line-height:1.6;color:var(--ink);margin-bottom:5px;font-weight:600}
  /* work area: answer left, source right, equal height when shown */
  .qwork{display:grid;grid-template-columns:1fr;gap:18px;align-items:stretch}
  .qwork.with-source{grid-template-columns:1fr 1fr;height:480px}
  .qmain{min-width:0;display:flex;flex-direction:column}
  .qwork.with-source .qmain,.qwork.with-source #answerzone,.qwork.with-source .answerbox{height:100%}
  #answerzone{flex:1;min-height:0}
  .sourcepanel{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;min-height:0}
  .sourcepanel[hidden]{display:none}
  .sphead{font-family:var(--disp);font-weight:600;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;flex:none}
  .spbody{flex:1;overflow-y:auto;min-height:0}
  .spbody .lzsvg{max-width:340px}
  .lzfoot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px}
  .lzfoot .lzexplain{flex:1;margin:0;background:none;padding:0;min-height:0}
  .submitrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:18px}

  /* step 5: rewrite ladder + practice + live rebuild */
  .rv-ladder{margin:4px 0 2px}
  .rv-rung{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;font-family:var(--body)}
  .rv-rung:hover{border-color:var(--blue)}
  .rv-rung.chosen{border:2px solid var(--blue);background:var(--blue-soft);cursor:default}
  .rv-rlvl{flex:none;font-family:var(--disp);font-weight:600;font-size:11px;padding:3px 9px;border-radius:8px;margin-top:1px;color:#fff}
  .rv-rlvl.a{background:var(--ink-3)} .rv-rlvl.b{background:var(--blue)} .rv-rlvl.c{background:var(--green)}
  .rv-rt{font-size:16px;line-height:1.6;color:var(--ink);font-weight:600}
  .rv-laddertip{font-size:12.5px;color:var(--ink-2);font-weight:600;margin:9px 2px 2px;line-height:1.5}
  .rv-pickother{display:inline-block;margin:10px 0 12px;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--blue-dk);background:#fff;border:1.5px solid var(--blue);border-radius:10px;cursor:pointer;padding:7px 14px}
  .rv-pickother:hover{background:var(--blue-soft)}
  .rv-practice{margin-top:6px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:15px}
  .rv-repdots{display:flex;gap:6px;margin-bottom:9px}
  .rv-repdot{width:9px;height:9px;border-radius:50%;background:var(--ink-3)}
  .rv-repdot.on{background:var(--green)}
  .rv-starter{font-size:15.5px;line-height:1.7;color:var(--ink);font-weight:600;margin:0 0 9px}
  .rv-starter b{color:var(--blue-dk);font-weight:800;letter-spacing:.5px}
  .rv-pinput{width:100%;border:1.5px solid var(--blue);border-radius:11px;padding:10px 12px;font-family:var(--body);font-size:14.5px;line-height:1.6;color:var(--ink);resize:vertical;min-height:46px}
  .rv-pinput:focus{outline:none;box-shadow:0 0 0 3px var(--blue-soft)}
  .rv-soft{font-size:12.5px;font-weight:700;line-height:1.45;min-height:16px;margin:8px 2px 0}
  .rv-soft.warn{color:var(--gold-dk)} .rv-soft.ok{color:var(--green-dk)}
  .rv-prow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .rv-freshlabel{font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--blue-dk);margin:14px 0 6px}
  .rv-rebuilt{margin-top:16px;border:1.5px solid var(--line);border-radius:16px;padding:10px 14px;background:#fff}
  .rv-rebuilttoggle{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--green-dk);padding:4px 2px}
  .rv-rbchev{color:var(--ink-3);font-size:12px}
  .rv-rwout{border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;background:#fff;font-size:15px;line-height:1.85;margin-top:10px}
  .rv-rwout .rv-ln{display:block;margin-bottom:4px}
  .rv-rwout .rv-ln.kept{color:var(--ink)}
  .rv-rwout .rv-ln.fixed{color:var(--ink);background:var(--green-soft);border-radius:4px;padding:0 3px}
  .rv-rwout .rv-ln.pending{color:var(--ink-2)}
  .rv-rwout .rv-rwempty{color:var(--ink-3);font-style:italic}
  .rv-miniok{font-size:12.5px;color:var(--green-dk);font-weight:800;margin-top:8px}

  /* ===== Essay practice mode (behind essayMode / ?essaydemo). White surfaces,
     strong ink, the single green accent, sentence case, no em-dashes. ===== */
  body.es-lock{overflow:hidden}
  .es-scrim{position:fixed;inset:0;background:rgba(28,40,40,.42);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto;z-index:120}
  .es-shell{width:100%;max-width:760px}
  .es-wrap{background:var(--card);border-radius:22px;box-shadow:0 24px 60px rgba(28,40,40,.28);padding:22px clamp(18px,3vw,30px) 28px;animation:rvpop .22s cubic-bezier(.35,.65,.25,1)}
  .es-shell:has(.es-wide){max-width:1040px}
  .es-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .es-brand{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .es-subj{font-size:12.5px;font-weight:700;color:var(--ink-2)}
  .es-demobadge{font-family:var(--disp);font-weight:600;font-size:11px;color:var(--green-dk);background:var(--green-soft);border-radius:99px;padding:2px 10px}
  .es-topbtns{display:flex;align-items:center;gap:10px;flex:none}
  .es-x{background:none;border:none;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink-2);padding:6px 12px;border-radius:10px;cursor:pointer}
  .es-x:hover{background:var(--green-soft);color:var(--green-dk)}
  .es-h1{font-family:var(--disp);font-weight:600;font-size:24px;color:var(--ink);margin-bottom:6px}
  .es-lead{font-size:14px;color:var(--ink-2);font-weight:600;margin-bottom:18px;line-height:1.55}
  .es-empty{text-align:center;padding:30px 10px 18px}
  .es-field{margin-bottom:18px}
  .es-label{display:block;font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--ink);margin-bottom:7px}
  .es-req{font-size:11px;font-weight:700;color:var(--green-dk);background:var(--green-soft);border-radius:99px;padding:2px 9px;margin-left:6px}
  .es-opt{font-size:11px;font-weight:700;color:var(--ink-3);margin-left:6px}
  .es-input{width:100%;font:inherit;font-weight:600;font-size:15px;line-height:1.6;color:var(--ink);background:var(--card);border:2px solid var(--line);border-radius:14px;padding:11px 14px}
  .es-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .es-ta{resize:vertical;min-height:64px}
  .es-select{font-family:var(--body);cursor:pointer}
  .es-help{font-size:12.5px;color:var(--ink-2);font-weight:600;line-height:1.5;margin:9px 0 7px}
  .es-qchips{display:flex;flex-direction:column;gap:8px}
  .es-qchip{text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:10px 13px;font:inherit;font-weight:600;font-size:13.5px;color:var(--ink);line-height:1.45;cursor:pointer;transition:border-color .12s}
  .es-qchip:hover{border-color:var(--green)}
  .es-qcmd{font-family:var(--disp);font-weight:600;color:var(--green-dk);font-size:12.5px;margin-right:4px}
  .es-linkbtn{background:none;border:none;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--green-dk);cursor:pointer;padding:6px 0;text-decoration:underline;text-underline-offset:3px}
  .es-linkbtn:hover{color:var(--green)}
  .es-bands{margin-top:10px;border:1.5px solid var(--line);border-radius:13px;overflow:hidden}
  .es-band{display:flex;gap:12px;padding:10px 13px;border-top:1px solid var(--line)}
  .es-band:first-child{border-top:none}
  .es-bandr{font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--green-dk);flex:none;width:96px}
  .es-bandt{font-size:12.5px;color:var(--ink-2);font-weight:600;line-height:1.5}
  .es-resume{margin-bottom:20px}
