<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginal — Distribution of Income & Wealth</title>
<meta name="description" content="Mastery practice for HSC Economics: flashcards, short answers and AI-marked extended responses.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3F5; --card:#FFFFFF;
    --ink:#3C4A4A; --ink-2:#7A8A88; --ink-3:#AEBAB8;
    --green:#1CC47D; --green-dk:#14A368; --green-soft:#E4F9EF;
    --blue:#1CA0F2; --blue-dk:#1487D6; --blue-soft:#E2F3FE;
    --gold:#FFB323; --gold-dk:#E89400; --gold-soft:#FFF3D8;
    --coral:#FF7C6B; --coral-dk:#EE5946; --coral-soft:#FFE8E4;
    --line:#E7EDED;
    --disp:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.disp{font-family:var(--disp);letter-spacing:-.01em}
  button{font:inherit;cursor:pointer}
  ::selection{background:var(--green-soft)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  header{display:flex;align-items:center;gap:12px;padding:16px clamp(16px,4vw,32px);background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:600;font-size:20px}
  .mk{width:28px;height:28px;border-radius:9px;background:var(--green);position:relative;flex:none;box-shadow:0 3px 0 var(--green-dk)}
  .mk::after{content:"";position:absolute;left:7px;right:7px;bottom:6px;height:3px;border-radius:2px;background:#fff}
  .mk::before{content:"";position:absolute;left:7px;bottom:6px;width:3px;height:14px;border-radius:2px;background:rgba(255,255,255,.9)}
  .unit{font-size:13px;color:var(--ink-2);font-weight:700;margin-left:auto;text-align:right}

  main{max-width:1180px;margin:0 auto;padding:28px clamp(16px,4vw,40px) 90px}

  .hi{font-family:var(--disp);font-weight:600;font-size:24px}
  .hi-s{color:var(--ink-2);font-weight:700;font-size:14px;margin:2px 0 20px}

  .areas{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .area{display:flex;gap:14px;align-items:center;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;transition:transform .12s,box-shadow .12s}
  .area:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(60,74,74,.1)}
  .area:focus-visible{outline:3px solid var(--green)}
  .aicon{font-size:28px;flex:none;width:52px;height:52px;display:grid;place-items:center;background:var(--green-soft);border-radius:14px}
  .ainfo{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .aname{font-family:var(--disp);font-weight:600;font-size:16px}
  .ablurb{font-size:12.5px;color:var(--ink-2);font-weight:700}
  .abar{height:8px;border-radius:99px;background:#EDF2F2;overflow:hidden;margin-top:4px}
  .abar i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .4s}
  .ameta{font-size:12px;color:var(--ink-3);font-weight:800}

  .settings{margin-top:26px;font-size:14px}
  .settings details{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 18px}
  .settings summary{font-family:var(--disp);font-weight:600;cursor:pointer}
  .settings p{color:var(--ink-2);font-weight:600;margin:10px 0}
  .settings input{width:100%;max-width:440px;font:inherit;font-weight:600;border:2px solid var(--line);border-radius:12px;padding:10px 13px;margin:0 8px 8px 0}
  .settings code{background:var(--bg);padding:1px 6px;border-radius:6px}

  .btn{font-family:var(--disp);font-weight:600;font-size:15px;color:#fff;background:var(--green);border:none;border-radius:14px;padding:12px 24px;box-shadow:0 4px 0 var(--green-dk);transition:transform .08s}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-dk)}
  .btn:disabled{opacity:.6}
  .btn.ghost{background:var(--card);color:var(--ink);box-shadow:0 0 0 2px var(--line) inset}
  .btn.sm{padding:9px 17px;font-size:14px;border-radius:12px;box-shadow:0 3px 0 var(--green-dk)}
  .btn.sm.ghost{box-shadow:0 0 0 2px var(--line) inset}

  .sessionbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .x{background:none;border:none;font-size:20px;color:var(--ink-2);padding:4px 8px;border-radius:10px}
  .x:hover{background:var(--card)}
  .sessionbar .lbl{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--ink-2);flex:none}
  .sbar{flex:1;height:11px;background:#E2EAEA;border-radius:99px;overflow:hidden}
  .sbar i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .3s}

  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-family:var(--disp);font-weight:500;font-size:12.5px;padding:5px 11px;border-radius:9px}
  .tag.blue{background:var(--blue-soft);color:var(--blue-dk)} .tag.gold{background:var(--gold-soft);color:var(--gold-dk)} .tag.gray{background:#E8EEEE;color:var(--ink-2)}

  .prompt{font-family:var(--disp);font-weight:500;font-size:21px;line-height:1.35;margin-bottom:16px}
  .scaffold{background:var(--blue-soft);border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:14px}
  .scaffold summary{font-family:var(--disp);font-weight:600;color:var(--blue-dk);cursor:pointer}
  .scaffold ol{margin:8px 0 4px 20px}
  .scaffold li{margin-bottom:4px;font-weight:600;color:#36678c}

  .choices{display:grid;gap:10px}
  .choice{text-align:left;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px 16px;font-weight:700;font-size:15px;transition:border-color .12s,transform .12s}
  .choice:hover{border-color:var(--green);transform:translateY(-1px)}
  .choice.right{border-color:var(--green);background:var(--green-soft)}
  .choice.wrong{border-color:var(--coral);background:var(--coral-soft)}

  .answerbox{width:100%;font:inherit;font-weight:600;font-size:15.5px;line-height:1.65;color:var(--ink);background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px 16px;resize:vertical}
  .answerbox:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .calcin{font:inherit;font-weight:700;font-size:17px;border:2px solid var(--line);border-radius:14px;padding:12px 16px;width:min(280px,100%)}
  .calcin:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .row{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap}
  .row.center{justify-content:center}
  .hint{font-size:13px;color:var(--ink-3);font-weight:700}

  .sheet{margin-top:18px;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:var(--card);animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}}
  .sheet .head{display:flex;align-items:center;gap:14px;padding:16px 20px}
  .sheet.great .head{background:var(--green-soft)} .sheet.good .head{background:var(--green-soft)}
  .sheet.mid .head{background:var(--gold-soft)} .sheet.low .head{background:var(--coral-soft)}
  .sheet h3{font-size:18px;font-weight:600}
  .score{font-family:var(--disp);font-weight:700;font-size:26px;flex:none}
  .score small{font-size:15px;color:var(--ink-2);font-weight:600}
  .sheet .bd{padding:16px 20px}
  .sheet .bd p{font-size:15px;margin-bottom:10px}
  .working{background:var(--bg);border-radius:12px;padding:10px 14px;font-size:14px!important}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 12px}
  .chip{font-family:var(--disp);font-weight:500;font-size:12.5px;padding:5px 11px;border-radius:9px;background:var(--green-soft);color:var(--green-dk)}
  .chip.todo{background:#fff;color:var(--ink-2);box-shadow:0 0 0 1.5px var(--line) inset;cursor:pointer}
  .crit{font-size:14px;margin-bottom:7px;display:flex;gap:9px;align-items:baseline}
  .crit .dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--ink-3);transform:translateY(-1px)}
  .crit.met .dot{background:var(--green)} .crit.partial .dot{background:var(--gold)} .crit.missing .dot{background:var(--coral)}
  .next{color:var(--blue-dk);font-weight:700}
  .sheet details{margin:8px 0}
  .sheet summary{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--blue-dk);cursor:pointer}
  .sheet .actions{display:flex;justify-content:flex-end;margin-top:8px}

  .summary{text-align:center;padding:40px 0}
  .bigscore{font-family:var(--disp);font-weight:700;font-size:54px;color:var(--green-dk)}
  .bigscore small{font-size:24px;color:var(--ink-2)}
  .summary h2{font-size:22px;margin:6px 0 10px}
  .summary p{color:var(--ink-2);font-weight:700;max-width:46ch;margin:0 auto 22px}

  .term{color:var(--blue-dk);font-weight:800;border-bottom:2px dotted var(--blue);cursor:pointer}
  .pop{position:absolute;z-index:50;max-width:300px;background:var(--ink);color:#EFF5F5;border-radius:14px;padding:12px 15px;font-size:13.5px;box-shadow:0 12px 30px rgba(27,42,41,.3)}
  .pop b{font-family:var(--disp);display:block;margin-bottom:3px;color:#fff;text-transform:capitalize}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:99px;z-index:60}

  .nav{display:flex;gap:6px;background:#E2EAEA;border-radius:99px;padding:5px;width:max-content;margin-bottom:20px}
  .navtab{font-family:var(--disp);font-weight:600;font-size:14px;border:none;background:none;color:var(--ink-2);padding:8px 22px;border-radius:99px}
  .navtab.on{background:var(--card);color:var(--green-dk);box-shadow:0 1px 4px rgba(60,74,74,.12)}
  .bcard{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
  .blabel{display:block;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink-2);margin:10px 0 5px}
  .binput{width:100%;font:inherit;font-weight:600;font-size:14.5px;color:var(--ink);border:2px solid var(--line);border-radius:12px;padding:10px 13px;background:#FBFDFD}
  .binput:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .binput.mono{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;font-weight:500}
  textarea.binput{resize:vertical}
  select.binput{appearance:auto}
  .brow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .brow.between{justify-content:space-between;align-items:center}
  .optrow{align-items:center;margin-bottom:8px}
  .optrow input[type=radio]{width:18px;height:18px;accent-color:var(--green);flex:none}
  .bh{font-size:16px;font-weight:600}
  .bhint{font-size:13.5px;color:var(--ink-2);font-weight:600;margin:6px 0 10px}
  .setlist{margin-top:14px}
  .setrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:14px;font-weight:600;flex-wrap:wrap}
  .setrow small{color:var(--ink-3)}
  .btn.danger{color:var(--coral-dk)}

  .modes{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:6px}
  .mode{display:flex;flex-direction:column;gap:3px;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:16px;transition:transform .12s,border-color .12s}
  .mode:hover:not(:disabled){transform:translateY(-2px);border-color:var(--green)}
  .mode:disabled{opacity:.45}
  .mname{font-family:var(--disp);font-weight:600;font-size:16px}
  .mdesc{font-size:12.5px;color:var(--ink-2);font-weight:700}
  .mcount{font-family:var(--disp);font-weight:600;font-size:12px;color:var(--green-dk);margin-top:4px}
  .hintrow{margin-bottom:12px}
  .hintbtn{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--gold-dk);background:none;border:none;padding:4px 0}
  .hintbox{background:var(--gold-soft);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:600;color:#7d5d12;animation:pop .2s ease}
  .flashface{background:var(--card);border:2px dashed var(--line);border-radius:18px;padding:26px;text-align:center}
  .flashprompt{color:var(--ink-2);font-weight:700;font-size:14.5px;margin-bottom:14px}
  .flashanswer{background:var(--card);border:2px solid var(--green);border-radius:18px;padding:20px;animation:pop .25s ease}
  .flashanswer p{font-size:15.5px;margin-bottom:8px}
  .raterow{display:flex;gap:10px;flex-wrap:wrap}
  .btn.rate{flex:1;min-width:100px}
  .btn.rate.low{background:var(--coral);box-shadow:0 4px 0 var(--coral-dk)}
  .btn.rate.mid{background:var(--gold);box-shadow:0 4px 0 var(--gold-dk)}
  .btn.rate.high{background:var(--green);box-shadow:0 4px 0 var(--green-dk)}
  .ctx{margin:10px 0;background:var(--blue-soft);border-radius:12px;padding:10px 14px}
  .ctx summary{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--blue-dk);cursor:pointer}
  .ctx p{margin-top:8px;font-size:14.5px;color:#2d5876}

  .flipwrap{perspective:850px;perspective-origin:center}
  .flipcard{position:relative;min-height:250px;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .85s cubic-bezier(.35,.65,.25,1);will-change:transform}
  .flipcard.flipped{transform:rotateY(180deg)}
  .flipwrap.lifting{animation:cardlift .85s cubic-bezier(.35,.65,.25,1)}
  @keyframes cardlift{0%{transform:scale(1)}45%{transform:scale(1.045) translateY(-8px);filter:drop-shadow(0 22px 26px rgba(60,74,74,.22))}100%{transform:scale(1)}}
  .face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;background:var(--card)}
  .face.front{z-index:2}
  .face.back{z-index:1}
  .flipcta{display:inline-flex;align-items:center;gap:9px;font-size:16px;padding:13px 28px}
  .flipcta svg{flex:none}
  .face.front{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;border:2px dashed var(--line);padding:26px;text-align:center;cursor:pointer}
  .face.front:hover{border-color:var(--green)}
  .face.front:focus-visible{outline:3px solid var(--green)}
  .fprompt{font-family:var(--disp);font-weight:500;font-size:20px;line-height:1.4}
  .fliphint{font-size:13px;color:var(--ink-3);font-weight:800}
  .face.back{transform:rotateY(180deg);border:2px solid var(--green);padding:18px 20px;min-height:240px}
  .backtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .flipback{font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--ink-2);background:var(--bg);border:none;border-radius:99px;padding:6px 12px}
  .fans{font-size:15.5px;margin-bottom:8px}
  @media(prefers-reduced-motion:reduce){.flipcard{transition:none}.flipwrap.lifting{animation:none}}

  .stimulus{background:#FFFDF6;border:1.5px solid var(--gold);border-radius:14px;padding:12px 16px;margin-bottom:14px}
  .stimlabel{font-family:var(--disp);font-weight:600;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-dk);margin-bottom:6px}
  .stimulus pre{font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.55;white-space:pre-wrap;color:var(--ink)}

  .enter{animation:cardenter .26s ease-out}
  @keyframes cardenter{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  kbd{font-family:var(--disp);font-weight:600;font-size:11px;background:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.55);border-radius:6px;padding:1px 6px;margin-right:2px}
  .fliphint kbd{background:var(--bg);border-color:var(--line);color:var(--ink-2)}

  .ckbd{background:var(--bg);border:1px solid var(--line);color:var(--ink-2);margin-right:9px}
  .flipcard.flyright{animation:flyR .24s ease-in forwards}
  .flipcard.flyleft{animation:flyL .24s ease-in forwards}
  .flipcard.flydown{animation:flyD .24s ease-in forwards}
  @keyframes flyR{to{transform:rotateY(180deg) translateX(-120%) rotate(-8deg);opacity:0}}
  @keyframes flyL{to{transform:rotateY(180deg) translateX(120%) rotate(8deg);opacity:0}}
  @keyframes flyD{to{transform:rotateY(180deg) translateY(40px);opacity:0}}
  .flipcard{touch-action:pan-y}

  .flipcta svg,.flipback svg{transition:transform .4s cubic-bezier(.35,.7,.3,1);transform-origin:center;vertical-align:-2px}
  .flipcta:hover svg{transform:rotate(180deg)}
  .flipback:hover svg{transform:rotate(-180deg)}
  @keyframes iconspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .flipcta.spinning svg{animation:iconspin .85s cubic-bezier(.35,.65,.25,1)}
  .flipback.spinning svg{animation:iconspin .85s cubic-bezier(.35,.65,.25,1) reverse}
  @keyframes iconnudge{0%,86%,100%{transform:rotate(0)}93%{transform:rotate(180deg)}}
  .flipcta svg{animation:iconnudge 4.5s ease 1.4s 1}
  @media(prefers-reduced-motion:reduce){.flipcta svg,.flipback svg{animation:none!important;transition:none!important}}

  .topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .topiccard{display:flex;gap:14px;align-items:center;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:18px;padding:18px;transition:transform .12s,border-color .12s,box-shadow .12s}
  .topiccard:hover:not(:disabled){transform:translateY(-2px);border-color:var(--green);box-shadow:0 8px 22px rgba(60,74,74,.1)}
  .topiccard.locked{opacity:.55}
  .ticon{font-size:30px;flex:none;width:56px;height:56px;display:grid;place-items:center;background:var(--blue-soft);border-radius:15px}
  .lessonrow{display:flex;gap:13px;align-items:center;text-align:left;width:100%;background:var(--green-soft);border:2px solid transparent;border-radius:16px;padding:14px 16px;margin-bottom:8px;transition:border-color .12s,transform .12s}
  .lessonrow:hover{border-color:var(--green);transform:translateY(-1px)}
  .lic{font-size:20px;flex:none;width:40px;height:40px;display:grid;place-items:center;background:#fff;border-radius:12px}
  .lgo{margin-left:auto;font-family:var(--disp);font-weight:600;font-size:14px;color:var(--green-dk);background:#fff;border-radius:99px;padding:7px 16px;flex:none}
  .chunk{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:22px 24px;margin-bottom:14px}
  .chunkh{font-size:20px;font-weight:600;margin-bottom:10px}
  .chunkbody{font-size:15.5px;line-height:1.75}
  .check{background:var(--blue-soft);border-radius:18px;padding:18px 20px}
  .checklabel{font-family:var(--disp);font-weight:600;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue-dk);margin-bottom:8px}

  .viz{background:#FBFDFD;border:1.5px solid var(--line);border-radius:14px;padding:14px 16px 8px;margin-top:14px}
  .viz svg{width:100%;height:auto;display:block;font-family:var(--body)}
  .lessonnav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
  .lnbtn{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--ink-2);background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:8px 16px}
  .lnbtn:hover:not(:disabled){color:var(--green-dk);border-color:var(--green)}
  .lnbtn:disabled{opacity:.4}
  .ldots{display:flex;gap:8px}
  .ldot{width:11px;height:11px;border-radius:50%;border:none;background:#D7E0DF;padding:0}
  .ldot.on{background:var(--green);transform:scale(1.25)}

  .srctab{position:fixed;right:0;top:42%;z-index:40;writing-mode:vertical-rl;font-family:var(--disp);font-weight:600;font-size:13.5px;color:#fff;background:var(--blue);border:none;border-radius:12px 0 0 12px;padding:16px 9px;box-shadow:-3px 0 0 var(--blue-dk);transition:right .3s cubic-bezier(.35,.7,.3,1)}
  .srctab.open{right:min(380px,86vw)}
  .srcpanel{position:fixed;right:min(-380px,-86vw);top:0;bottom:0;width:min(380px,86vw);z-index:39;background:var(--card);border-left:1.5px solid var(--line);box-shadow:-14px 0 34px rgba(60,74,74,.12);padding:22px 22px 30px;overflow-y:auto;transition:right .3s cubic-bezier(.35,.7,.3,1)}
  .srcpanel.open{right:0}
  .srchead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .srchead h3{font-size:17px;font-weight:600}

  .qlab{font-size:11px;font-weight:800;color:var(--ink-2)}
  .qrun{font-size:13px;font-weight:800;color:var(--green-dk)}
  .calclbl{font-weight:800;font-size:14px;color:var(--ink-2)}

  .lvlcard:hover{transform:translateY(-2px);border-color:var(--green)}
  .lvlcard.done{border-color:var(--green);background:linear-gradient(180deg,#FDFFFE,var(--green-soft))}

  .masterban{background:linear-gradient(135deg,var(--green-soft),#FFF6DF);border:2px solid var(--green);border-radius:16px;padding:14px 18px;font-weight:800;color:var(--green-dk);margin-bottom:16px}

  .refbtn{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--blue-dk);background:var(--blue-soft);border:none;border-radius:99px;padding:9px 16px}

  .refbody{margin-top:10px}
  .refcaret{opacity:.7;margin-left:2px}
  .vhits{margin:6px 0}
  .vchip{display:inline-block;font-size:12px;font-weight:800;border-radius:8px;padding:2.5px 9px;margin:2px 3px 2px 0}
  .vchip.hit{background:var(--green-soft);color:var(--green-dk)}
  .vchip.miss{background:#F4E9E7;color:var(--coral-dk);text-decoration:line-through;text-decoration-thickness:1.5px}

  .stepgrid{display:grid;gap:16px}
  @media(min-width:1080px){
    .stepgrid{grid-template-columns:1.12fr .88fr;align-items:start}
    .steptask{position:sticky;top:18px}
  }
  .concept{background:var(--blue-soft);border-left:4px solid var(--blue);border-radius:10px;padding:10px 14px;font-size:14.5px;font-weight:700;color:#2d5876;margin:2px 0 14px;line-height:1.55}
  .concept::before{content:"Concept · ";font-family:var(--disp);letter-spacing:.05em;text-transform:uppercase;font-size:10.5px;color:var(--blue-dk)}
</style>

<script>
// =============================================================================

window.CONTENT = {
  subject: "Economics",
  unit: "Distribution of Income and Wealth",
  glossary: {
    "income": "A flow of money and benefits received over a period of time, in return for factors of production or as government transfers.",
    "wealth": "The stock of net assets (real and financial) owned at a point in time.",
    "net worth": "Total assets minus total liabilities — the measure of wealth.",
    "lorenz curve": "A graph plotting cumulative share of income or wealth against cumulative share of the population, used to show inequality.",
    "gini coefficient": "A number between 0 (perfect equality) and 1 (perfect inequality) summarising how far the Lorenz curve sits from the line of perfect equality.",
    "quintile": "One fifth (20%) of the population, ranked from lowest to highest income or wealth.",
    "equivalised disposable income": "Household income after tax, adjusted so households of different sizes and compositions can be compared fairly.",
    "progressive taxation": "A tax system where the rate of tax paid rises as income rises.",
    "marginal tax rate": "The rate of tax paid on the next dollar of income earned.",
    "transfer payments": "Government payments such as pensions and JobSeeker that redistribute income to those with little or no market income.",
    "social wage": "Government-provided services (health, education, housing, transport) that lift the living standards of low-income earners beyond their cash income.",
    "poverty trap": "A situation where withdrawal of welfare plus tax on new earnings creates very high effective marginal tax rates, weakening the incentive to work.",
    "incentive effect": "The argument that income differences motivate effort, skill-building and entrepreneurial risk-taking.",
    "bracket creep": "Paying a higher average rate of tax over time as income growth pushes earners into higher tax brackets.",
    "flow concept": "A quantity measured over a period of time (e.g. income per week).",
    "stock concept": "A quantity measured at a point in time (e.g. wealth today)."
  },
  areas: [
    {
      id: "measuring",
      name: "Measuring inequality",
      blurb: "Lorenz curves, the Gini coefficient and quintiles — the toolkit.",
      icon: "📐",
      cards: [
        { id:"m1", type:"mc", marks:1,
          prompt:"On a Lorenz curve diagram, greater income inequality is shown by:",
          choices:[
            {t:"The curve moving closer to the diagonal line", ok:false, why:"Moving toward the diagonal (line of perfect equality) shows LESS inequality."},
            {t:"The curve bowing further away from the diagonal line", ok:true, why:"The larger the gap between the curve and the line of perfect equality, the greater the inequality."},
            {t:"The curve crossing the diagonal line", ok:false, why:"A Lorenz curve cannot cross the line of perfect equality — cumulative shares can't exceed equality."},
            {t:"A steeper diagonal line", ok:false, why:"The diagonal is fixed at 45° — it's the reference line, it doesn't move."}
          ]},
        { id:"m2", type:"calc", marks:2,
          prompt:"On a Lorenz diagram, the area between the line of perfect equality and the Lorenz curve is 0.2, and the remaining area under the curve is 0.3. Calculate the Gini coefficient (1 decimal place).",
          expected:0.4, tolerance:0.01,
          working:"Gini = A ÷ (A + B) = 0.2 ÷ (0.2 + 0.3) = 0.4",
          model:"0.4"},
        { id:"m3", type:"define", marks:2,
          prompt:"Define the Gini coefficient and state its possible range of values.",
          vocab:["lorenz","equality","zero","one"],
          model:"The Gini coefficient is a single-number measure of inequality, calculated from the Lorenz curve as the ratio of the area between the curve and the line of perfect equality to the total area under that line. It ranges from 0 (perfect equality) to 1 (perfect inequality)."},
        { id:"m4", type:"mc", marks:1,
          prompt:"A country's Gini coefficient for income falls from 0.34 to 0.31. This indicates:",
          choices:[
            {t:"Income inequality has increased", ok:false, why:"A rising Gini means rising inequality — this one fell."},
            {t:"Income inequality has decreased", ok:true, why:"A fall toward zero means the distribution has become more equal."},
            {t:"Average income has fallen", ok:false, why:"The Gini measures the spread of income, not its level."},
            {t:"Wealth is now more equal than income", ok:false, why:"This Gini describes income only — it says nothing about wealth."}
          ]},
        { id:"m5", type:"short", marks:3,
          prompt:"Explain why the ABS uses equivalised disposable household income, rather than gross income, when measuring inequality.",
          vocab:["tax","household","needs","compare"],
          model:"Gross income ignores two things that change real living standards: taxation and household composition. Disposable income (gross income less tax) shows what households can actually spend, and equivalising adjusts for the number of adults and children so a single person and a family of five can be compared on the same basis. Without these adjustments, measured inequality would mix up genuine income differences with differences in household size and tax paid."},
        { id:"m6", type:"calc", marks:2,
          prompt:"In 2019–20 the highest income quintile received 39.8% of equivalised disposable income and the lowest quintile 7.4%. Calculate how many times larger the top quintile's share was (1 decimal place).",
          expected:5.4, tolerance:0.1,
          working:"39.8 ÷ 7.4 ≈ 5.4 times",
          model:"About 5.4 times larger"}
      ]
    },
    {
      id: "income",
      name: "Income — sources & concepts",
      blurb: "Flow vs stock, earned vs unearned, and where household income comes from.",
      icon: "💵",
      cards: [
        { id:"i1", type:"define", marks:2,
          prompt:"Distinguish between income as a flow concept and wealth as a stock concept.",
          vocab:["flow","stock","period","point"],
          model:"Income is a flow: it is received over a period of time (e.g. wages per week) and can change with each period. Wealth is a stock: it is the value of net assets held at a single point in time. A flow adds to or drains a stock — saving income builds wealth."},
        { id:"i2", type:"mc", marks:1,
          prompt:"Which of the following is an example of unearned income?",
          choices:[
            {t:"A salary from full-time work", ok:false, why:"Wages and salaries are earned income — payment for labour."},
            {t:"Overtime payments", ok:false, why:"Overtime is still a return to labour, so it's earned income."},
            {t:"Dividends from owning shares", ok:true, why:"Dividends are a return on capital ownership, not labour — unearned income."},
            {t:"A performance bonus", ok:false, why:"Bonuses are tied to work performed, so they're earned income."}
          ]},
        { id:"i3", type:"mc", marks:1,
          prompt:"In 2024–25, the largest source of gross household income in Australia was:",
          choices:[
            {t:"Profits of unincorporated businesses", ok:false, why:"Profits were the second-largest source at about 17.7%."},
            {t:"Wages and salaries", ok:true, why:"Compensation of employees was about 57.9% of gross household income — by far the largest share."},
            {t:"Rent, interest and dividends", ok:false, why:"Property income contributed about 12.7%."},
            {t:"Social benefits", ok:false, why:"Welfare transfers were about 7.7% of the total."}
          ]},
        { id:"i4", type:"short", marks:3,
          prompt:"Explain how government transfer payments differ from market income, and give two examples of transfer payments.",
          vocab:["government","welfare","pension","market"],
          model:"Market income is earned through participating in production — wages for labour, profit for enterprise, rent and interest for property. Transfer payments are received from the government without any corresponding contribution to current production; they redistribute tax revenue to those with little market income. Examples include the age pension and JobSeeker payments (also acceptable: youth allowance, family benefits, disability support)."},
        { id:"i5", type:"calc", marks:3,
          prompt:"Using the 2024–25 resident tax rates (0% to $18,200; 16% from $18,201–$45,000; 30% from $45,001–$135,000), calculate the income tax payable on a taxable income of $60,000.",
          expected:8788, tolerance:1,
          working:"($45,000 − $18,200) × 16% = $4,288. ($60,000 − $45,000) × 30% = $4,500. Total = $8,788.",
          model:"$8,788"},
        { id:"i6", type:"mc", marks:1,
          prompt:"The 'social wage' refers to:",
          choices:[
            {t:"The national minimum wage set by the Fair Work Commission", ok:false, why:"That's a wage floor in the labour market — related, but not the social wage."},
            {t:"Government spending on services like health, education and housing that benefits low-income households", ok:true, why:"The social wage is the in-kind benefit of public services, lifting living standards beyond cash income."},
            {t:"Average weekly earnings across the economy", ok:false, why:"AWE is a measure of market wages, not government provision."},
            {t:"Superannuation paid by employers", ok:false, why:"Super is deferred employment income, not government service provision."}
          ]}
      ]
    },
    {
      id: "wealth",
      name: "Wealth — sources & the income link",
      blurb: "Net worth, what households own, and why wealth and income feed each other.",
      icon: "🏠",
      cards: [
        { id:"w1", type:"calc", marks:2,
          prompt:"A household owns assets valued at $950,000 and owes $180,000 in mortgage and personal loans. Calculate its net worth in dollars.",
          expected:770000, tolerance:0,
          working:"Net worth = total assets − total liabilities = $950,000 − $180,000 = $770,000",
          model:"$770,000"},
        { id:"w2", type:"mc", marks:1,
          prompt:"According to the ABS 2019–20 survey, the largest component of Australian household wealth was:",
          choices:[
            {t:"Superannuation balances", ok:false, why:"Super was the second-largest component at about 18.6%."},
            {t:"Owner-occupied housing and other property", ok:true, why:"Property made up about 56.2% of household assets — easily the largest share."},
            {t:"Shares, trusts and bonds", ok:false, why:"Financial securities were only about 5.1% of assets."},
            {t:"Bank deposits", ok:false, why:"Accounts with financial institutions were about 6.6%."}
          ]},
        { id:"w3", type:"short", marks:4,
          prompt:"Explain the relationship between the distribution of income and the distribution of wealth.",
          vocab:["wealth","income","saving","unearned"],
          model:"The two reinforce each other. High income earners can save more, and those savings accumulate into wealth — property, shares and superannuation. That wealth then generates unearned income (rent, interest, dividends), which raises their income further. Low income earners save little, accumulate little wealth, and so receive little unearned income. The result is that wealth inequality both reflects and amplifies income inequality over time."},
        { id:"w4", type:"mc", marks:1,
          prompt:"Wealth in Australia is distributed more unequally than income mainly because:",
          choices:[
            {t:"Wages differ widely between occupations", ok:false, why:"Wage differences drive income inequality — the question asks why wealth is even more unequal."},
            {t:"Wealth accumulates over a lifetime and compounds through home ownership and returns on assets", ok:true, why:"Wealth builds cumulatively — those with assets earn returns that buy more assets, and older households have had decades to accumulate."},
            {t:"The government taxes wealth more heavily than income", ok:false, why:"Australia has no general wealth tax, death duties or inheritance tax — wealth is taxed lightly."},
            {t:"Welfare payments are included in wealth statistics", ok:false, why:"Transfers are income, not wealth."}
          ]},
        { id:"w5", type:"define", marks:2,
          prompt:"Define net worth and identify the two broad categories of assets it includes.",
          vocab:["assets","liabilities","financial"],
          model:"Net worth is the value of total assets minus total liabilities at a point in time. Assets fall into two broad categories: non-financial (real) assets such as property and household contents, and financial assets such as bank deposits, shares and superannuation."}
      ]
    },
    {
      id: "patterns",
      name: "Patterns & people",
      blurb: "Quintile trends, mean vs median, and how age, gender and family shape income.",
      icon: "📊",
      cards: [
        { id:"p1", type:"mc", marks:1,
          prompt:"In 2019–20, mean equivalised disposable household income ($1,124/week) was higher than the median ($959/week). This tells us the distribution is:",
          choices:[
            {t:"Perfectly symmetrical", ok:false, why:"In a symmetrical distribution the mean and median are equal."},
            {t:"Skewed by a small number of very high incomes pulling the mean up", ok:true, why:"A long upper tail of high incomes raises the mean above the median — the classic asymmetric income distribution."},
            {t:"Skewed by a large number of very high incomes", ok:false, why:"It's a relatively small number of very high incomes that stretches the tail."},
            {t:"Becoming more equal over time", ok:false, why:"Comparing mean and median at one date says nothing about the trend."}

        { id:"p2", type:"short", marks:4,
          prompt:"Explain how the income life cycle helps account for differences in income and wealth between younger and older households.",
          vocab:["life cycle","accumulate","retirement","working"],
          model:"Income and wealth follow a life-cycle pattern. Young households early in their working lives typically have moderate incomes and very little accumulated wealth. Through the working years, income peaks (roughly ages 35–54) and saving builds wealth in housing and superannuation. In retirement, income falls but accumulated wealth is high and is gradually drawn down. This explains why many older households combine low income with high net worth, while younger 'twin income' households can show the reverse."},
        { id:"p3", type:"mc", marks:1,
          prompt:"Which household type was most heavily concentrated in the lowest income quintile in 2019–20?",

            {t:"A rise in the share of income going to the top quintile", ok:false, why:"The top quintile's share actually fell about 1 percentage point over the period."}

    },
    {
      id: "debate",
      name: "The inequality debate",
      blurb: "Benefits, costs, incentives and poverty traps — both sides of the argument.",
      icon: "⚖️",
      cards: [
        { id:"d1", type:"mc", marks:1,

      "The ABS measures the income distribution through the Survey of Income and Housing using equivalised disposable household income — gross income less direct tax, then adjusted by an equivalence scale so households of different sizes and compositions can be compared on a like-for-like basis. Households are ranked and divided into quintiles (equal 20% groupings of income units). In 2019–20 the lowest quintile received 7.4% of total equivalised disposable income (about $415 per week), the second 12.6% ($710), the third 17.2% ($966), the fourth 23.0% ($1,294) and the highest 39.8% ($2,234). The middle three quintiles — 60% of the population — received 52.8%. This degree of inequality is high but typical of OECD market economies, and the equivalisation step is what makes the comparison meaningful rather than an artefact of household size or tax paid.",
      "The Lorenz curve graphs the distribution: cumulative percentage of families or income units on the horizontal axis, cumulative percentage of income or wealth on the vertical. The curve has four defining properties: it begins at the origin (zero families earn zero income); it terminates where 100% of families receive 100% of income; the diagonal is the line of perfect equality, on which any cumulative share of families receives exactly that share of income (point C marks 60% of families receiving 60% of income); and because market distributions are unequal, real Lorenz curves lie below the diagonal. The curve's position is also the trend indicator: an inward shift toward the diagonal represents reduced inequality, an outward shift represents increased inequality — which is how changes over time, or comparisons between sub-populations, are read.",
      "The Gini coefficient converts the diagram into a single statistic: the ratio of Area A (between the line of perfect equality and the Lorenz curve) to the whole triangle beneath the diagonal (Area A + Area B). At perfect equality Area A vanishes and the coefficient is 0; at perfect inequality Area A fills the triangle and it equals 1. Movement matters as much as level: Australia's income Gini fell from 0.333 in 2013–14 to 0.324 in 2019–20 — a 2.7% decline in measured inequality attributed largely to a strengthened, better-targeted social security system — but within that period it rose from 0.323 (2015–16) to 0.328 (2017–18), most likely because high-income households gained disproportionately from growth in unearned income, before easing back. The same instrument applied to wealth yields 0.611 — nearly double."

      "The household income account (ABS National Accounts, Cat. 5206.0) classifies sources precisely. Compensation of employees — wages, salaries and supplements such as superannuation — was 57.9% of total gross household income in 2024–25. Gross operating surplus and mixed income, the profits of incorporated and unincorporated trading enterprises, contributed 17.7%. Property income — rent, interest and dividends, much of it flowing to self-funded retirees — contributed 12.7%, and social benefits receivable 7.7%. Total gross income reached $2,264,201m, up 6.7% on 2023–24. The composition is itself a distribution story: profits grew 8.1% against 6.1% for wages, so the wages share slipped from 58.3% to 57.9% — small annual movements in factor shares that compound into the inequality trend.",
      "The tax-transfer system — the core of the government's social policy — has three elements. First, progressive taxation: the proportion of income paid in tax rises with gross income, anchored by the $18,200 tax-free threshold and marginal rates climbing from 16% to 45%. Second, transfer payments: roughly 37% of taxation revenue is redistributed as pensions, JobSeeker, family benefits and allowances to the aged, veterans and dependants, people with disabilities, low-income families, the unemployed and the sick, carers, and Indigenous Australians — with income and assets tests targeting support at genuine need. Third, the social wage: direct and subsidised provision of health (Medicare), education, housing, transport, childcare and community services, which raises low-income households' real living standards in kind rather than in cash."

      "The ABS 2019–20 survey put total household assets at $12,356b (up 2.9% from $12,008b in 2017–18) against liabilities of $2,038b, giving aggregate net worth of $10,318b — roughly five times Australia's annual GDP. Composition explains the politics of wealth: owner-occupied and other property dominates at 56.2% of household assets, followed by superannuation (18.6%), deposits with financial institutions (6.6%), household contents (6.1%), own businesses (5.2%), shares, trusts, debentures and bonds (5.1%) and vehicles (2.2%). Mean household net worth was $1,042,000 — but the median was just $579,900, a gap that signals the same right-skew found in income, only deeper. With property the dominant asset class, dwelling prices are the single largest driver of movements in Australian wealth inequality.",
      "There is a strong correlation between the two distributions, and it runs through saving: high income earners have high saving ratios, savings accumulate as property and financial assets, and those assets generate unearned income — rent, interest, dividends and profit — which raises income further and finances more accumulation. Table 11.4 quantifies the result: the highest quintile held 62.8% of net worth (averaging $3,267,100) but a smaller 47.6% share of gross weekly income, while the lowest quintile held 0.7% of net worth ($35,100) against 4.1% of gross income. The Gini trio makes the comparison exact: 0.611 for net worth, 0.436 for gross income, 0.324 for equivalised disposable income. Part of the gap is life-cycle: wealth is accumulated across a working life and drawn down in retirement, so older households combine high net worth with low current income while younger 'twin income' households show the reverse."
    ],
    "les-patterns": [

      "Income varies systematically along several dimensions. Gender: male average weekly earnings were $2,074 in 2024 against $1,814 for females, with the gap persisting within the same occupational categories. Occupation: managers and professionals averaged between $2,712 and $1,954 per week, against $785 to $1,238 for sales, clerical and administrative workers. Age: earnings peak in the 35–54 bracket ($2,396 for adult males, $1,991 for adult females) against $1,734 for 21–34 year-olds, and employment status compounds this — casual and part-time workers earn far less than full-time employees. Ethnicity: migrants from English-speaking countries out-earn more recent arrivals, longer residency lifts income, and Indigenous Australians remain among the lowest income earners, with many reliant on transfer payments. These dimensions overlap, which is how disadvantage concentrates.",

    "les-debate": [

      "The costs are macroeconomic, fiscal and social. Keynes (1936) argued that concentrating income where the propensity to save is highest produces deficient aggregate demand, correctable through redistributive policy — the opportunity cost of inequality is the consumption and utility forgone by low-income earners. Fiscally, greater inequality drives higher social welfare spending, a heavier tax burden, and a weaker budget position through larger deficits or smaller surpluses. Socially, divisions emerge along income lines: groups whose members rely on welfare — Indigenous Australians, the unemployed, single parents, large low-income families, aged pensioners — can be alienated from market opportunity while some taxpayers resent funding support. Gregory's (1993) research identified a 'working poor' dependent on annual adjustments to Modern Awards and the National Minimum Wage, and casualisation plus a decentralised industrial relations system has marginalised an underclass of workers. Relative poverty remains the major social cost.",

<script>
// =============================================================================
// Marginal trial — app logic (single-file preview build)
// Adds to the repo build: safe storage wrapper (works in sandboxed previews),
// a Create tab to build your own flashcard sets, and JSON export / import.
// =============================================================================
(function () {
  "use strict";
  const C = window.CONTENT;
  const CONFIG = window.MARGINAL_CONFIG || {}; // teacher-set defaults (see index.html)
  const LS_KEY = "marginal.trial.v1";
  const BOX_DAYS = { 1: 0, 2: 1, 3: 3, 4: 7, 5: 14 };
  const SET_FORMAT = "marginal-set@1";

  // ---------- storage: localStorage where allowed, in-memory otherwise ----------
  const store = (() => {
    try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); return localStorage; }
    catch { const m = {}; return { getItem: k => (k in m ? m[k] : null), setItem: (k, v) => { m[k] = String(v); }, removeItem: k => { delete m[k]; } }; }
  })();
  const persistent = (() => { try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; } catch { return false; } })();

  // ---------- state ----------
  const state = load();
  function load() {
    try { return JSON.parse(store.getItem(LS_KEY)) || blank(); } catch { return blank(); }
    function blank() { return { cards: {}, endpoint: "", code: "", log: [], customSets: [], lessons: {} }; }
  }
  state.customSets = state.customSets || [];
  state.lessons = state.lessons || {};
  // Teacher's TEACHER SETUP config is the source of truth for the endpoint —
  // students have no field to edit it, so always sync from CONFIG (this also
  // clears any endpoint a returning user has stale in localStorage).
  state.endpoint = (CONFIG.endpoint || "").trim();
  if (!state.code && CONFIG.code) state.code = CONFIG.code;
  function mergeCustomGlossaries() {
    state.customSets.forEach(s => { if (s.glossary) Object.keys(s.glossary).forEach(k => { C.glossary[k.toLowerCase()] = s.glossary[k]; }); });
  }
  mergeCustomGlossaries();
  function save() { store.setItem(LS_KEY, JSON.stringify(state)); }
  const BACKUP_FORMAT = "marginal-backup@1";
  function download(filename, text, mime) {
    const blob = new Blob([text], { type: mime || "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1500);
  }
  function backupAll() {
    const payload = {
      format: BACKUP_FORMAT, exported: new Date().toISOString(),
      subject: C.subject || "",
      data: { cards: state.cards, lessons: state.lessons, log: state.log, customSets: state.customSets }
    };
    const stamp = new Date().toISOString().slice(0, 10);
    download("marginal-backup-" + stamp + ".json", JSON.stringify(payload, null, 2));
    toast("Backup downloaded — keep it safe.");
  }
  function restoreAll(text) {
    let obj;
    try { obj = JSON.parse(text); } catch { return { ok: false, msg: "That file isn't valid JSON." }; }
    if (!obj || obj.format !== BACKUP_FORMAT || !obj.data) return { ok: false, msg: "That doesn't look like a Marginal backup file." };
    const d = obj.data;
    // merge: keep the better progress per card, union custom sets by name
    state.cards = state.cards || {};
    Object.keys(d.cards || {}).forEach(id => {
      const cur = state.cards[id], inc = d.cards[id];
      if (!cur || (inc && (inc.box || 0) >= (cur.box || 0))) state.cards[id] = inc;
    });
    state.lessons = Object.assign({}, d.lessons || {}, state.lessons); // existing mastery wins
    Object.keys(d.lessons || {}).forEach(k => { if (!state.lessons[k]) state.lessons[k] = d.lessons[k]; });
    if (Array.isArray(d.customSets)) {
      const names = new Set(state.customSets.map(s => s.name));
      let added = 0;
      d.customSets.forEach(s => { if (!names.has(s.name)) { state.customSets.push(s); added++; } });
      mergeCustomGlossaries();
    }
    if (Array.isArray(d.log)) state.log = state.log.concat(d.log);
    save();
    return { ok: true, msg: "Backup restored — your sets and progress are merged in." };
  }
  function cardState(id) {
    return state.cards[id] || (state.cards[id] = { box: 1, due: 0, seen: 0, correct: 0, lastScore: null });
  }

  let currentTopic = null;
  function customAsArea(s) {
    return { id: s.id, name: s.name, icon: "🧩", custom: true,
      blurb: "Your set · " + s.cards.length + " card" + (s.cards.length === 1 ? "" : "s"),
      cards: s.cards };
  }
  function findArea(id) {
    for (const t of C.topics) { const a = (t.areas || []).find(x => x.id === id); if (a) return a; }
    const s = state.customSets.find(x => x.id === id);
    return s ? customAsArea(s) : null;
  }
  function getLesson(id) {
    for (const a of C.areas) { const l = (a.lessons || []).find(x => x.id === id); if (l) return l; }
    return null;
  }
  function lvObj(lessonId) {
    let v = state.lessons[lessonId];
    if (v === true) { // migrate legacy boolean: counts as all levels done
      const l = getLesson(lessonId);
      v = { lv: {} };
      (l && l.levels || []).forEach((_, i) => v.lv[i] = 1);
      state.lessons[lessonId] = v;
    }
    if (!v || typeof v !== "object") { v = { lv: {} }; state.lessons[lessonId] = v; }
    if (!v.lv) v.lv = {};
    return v;
  }
  function levelsDone(lesson) {
    if (!lesson.levels) return state.lessons[lesson.id] ? 1 : 0;
    const v = lvObj(lesson.id);
    return lesson.levels.reduce((n, _, i) => n + (v.lv[i] ? 1 : 0), 0);
  }
  function lessonMastered(lesson) {
    if (!lesson.levels) return !!state.lessons[lesson.id];
    return levelsDone(lesson) === lesson.levels.length;
  }

  // ---------- grading ----------
  const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9.\-% ]/g, " ").replace(/\s+/g, " ").trim();

  function gradeMC(card, choiceIdx) {
    const ch = card.choices[choiceIdx];
    return { score: ch.ok ? card.marks : 0, max: card.marks, kind: "mc",
             correct: ch.ok, why: ch.why || "", answerText: card.choices.find(c => c.ok).t };
  }
  function gradeCalc(card, answer) {
    const got = parseFloat(String(answer).replace(/[^0-9.\-]/g, ""));
    const ok = Number.isFinite(got) && Math.abs(got - card.expected) <= card.tolerance;
    return { score: ok ? card.marks : 0, max: card.marks, kind: "calc",
             correct: ok, working: card.working || "", model: card.model };
  }
  function gradeLocal(card, answer) {
    const a = norm(answer);
    const need = card.vocab || [];
    const hit = need.filter(t => a.includes(norm(t)));
    const modelWords = new Set(norm(card.model).split(" ").filter(w => w.length > 3));
    const gotWords = new Set(a.split(" ").filter(w => w.length > 3));
    let overlap = 0;
    if (modelWords.size) { let n = 0; gotWords.forEach(w => { if (modelWords.has(w)) n++; }); overlap = n / modelWords.size; }
    const lengthOk = a.split(" ").length >= card.marks * 8;
    let ratio = (need.length ? 0.55 * (hit.length / need.length) : 0.3) + 0.35 * Math.min(overlap * 1.6, 1) + (lengthOk ? 0.1 : 0);
    ratio = Math.max(0, Math.min(1, ratio));
    return { score: Math.round(ratio * card.marks), max: card.marks, kind: "local",
             matched: hit, missing: need.filter(t => !hit.includes(t)), model: card.model };
  }
  async function gradeEssay(card, answer) {
    if (state.endpoint) {
      try {
        const res = await fetch(state.endpoint, {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ prompt: card.prompt, marks: card.marks, model_answer: card.model, vocab: card.vocab, answer, code: state.code || undefined })
        });
        if (!res.ok) throw new Error("proxy " + res.status);
        const g = await res.json();
        return { score: Math.min(g.score ?? 0, card.marks), max: card.marks, kind: "llm", fb: g };
      } catch (e) {
        return demoEssay(card, answer, "Couldn't reach your grading endpoint (" + e.message + ") — showing a demo grade instead.");
      }
    }
    return demoEssay(card, answer, "Demo grade — connect a grading endpoint in Settings for real AI marking.");
  }
  function demoEssay(card, answer, note) {
    const a = norm(answer);
    const need = card.vocab || [];
    const hit = need.filter(t => a.includes(norm(t)));
    const paras = answer.split(/\n\s*\n/).filter(p => p.trim().length > 40);
    const words = a.split(" ").length;
    let ratio = 0.5 * (need.length ? hit.length / need.length : 0.4)
              + 0.3 * Math.min(words / (card.marks * 35), 1)
              + 0.2 * Math.min(paras.length / 4, 1);
    ratio = Math.max(0.05, Math.min(0.85, ratio));
    const fb = {
      overall: { summary: note + " Structure detected: " + paras.length + " paragraph(s), " + words + " words." },
      criteria: [
        { name: "Required metalanguage", status: need.length === 0 ? "met" : hit.length >= need.length * 0.7 ? "met" : hit.length ? "partial" : "missing",
          comment: need.length ? hit.length + " of " + need.length + " key terms used." : "No required terms set for this card." },
        { name: "Development (length & paragraphs)", status: words >= card.marks * 30 && paras.length >= 3 ? "met" : "partial",
          comment: "Aim for roughly " + (card.marks * 35) + "+ words across 4–5 paragraphs for " + card.marks + " marks." }
      ],
      missing_vocabulary: need.filter(t => !hit.includes(t)),
      next_steps: ["This is a structural check only — it cannot judge your reasoning. Compare your answer with the guide below, then connect an endpoint for real marking."]
    };
    return { score: Math.round(ratio * card.marks), max: card.marks, kind: "demo", fb };
  }

  // ---------- scheduling ----------
  function applyResult(card, score, max) {
    const cs = cardState(card.id);
    cs.seen++;
    const ratio = max ? score / max : 0;
    if (ratio >= 0.7) { cs.correct++; cs.box = Math.min(5, cs.box + 1); }
    else if (ratio < 0.4) cs.box = 1;
    cs.due = Date.now() + BOX_DAYS[cs.box] * 86400000;
    cs.lastScore = ratio;
    state.log.push({ t: Date.now(), id: card.id, r: ratio });
    save();
  }
  function areaStats(area) {
    let mastered = 0, attempted = 0;
    area.cards.forEach(c => {
      const cs = state.cards[c.id];
      if (cs && cs.seen) attempted++;
      if (cs && cs.box >= 4) mastered++;
    });
    return { total: area.cards.length, attempted, mastered, pct: area.cards.length ? Math.round(100 * mastered / area.cards.length) : 0 };
  }
  function dueCards(area) {
    const now = Date.now();
    return area.cards.filter(c => { const cs = state.cards[c.id]; return !cs || cs.due <= now; })
                     .sort((a, b) => (cardState(a.id).box - cardState(b.id).box));
  }

        html = html.replace(re, '<span class="term" data-term="' + esc(term) + '">$1</span>');

    taxCalc(el) {
      const br = [[0, 18200, 0], [18200, 45000, 16], [45000, 135000, 30], [135000, 190000, 37], [190000, Infinity, 45]];
      el.innerHTML = `

        const inc = Math.max(0, +input.value || 0);

  // ============ MASTERY LADDER (levels of steps; one focus per screen) ============
  const vm = v => typeof v === "string" ? { t: v, d: v } : v;
  function taskHTML(task) {
    if (!task) return "";
    if (task.type === "check" || task.type === "scenario") {
      const label = task.type === "scenario" ? "Apply it" : "Quick check";
      return `<div class="check task"><div class="checklabel">${label}</div>
        <div class="prompt" style="font-size:17.5px">${esc(task.q)}</div>
        <div class="choices">${task.opts.map((o, i) => `<button class="choice" data-i="${i}"><kbd class="ckbd">${i + 1}</kbd>${esc(o.t)}</button>`).join("")}</div>
        <div class="taskfb"></div></div>`;
    }
    if (task.type === "calc") return `<div class="check task"><div class="checklabel">Calculate it</div>
      <div class="prompt" style="font-size:17.5px">${esc(task.q)}</div>
      <div class="row"><input id="taskIn" class="calcin" inputmode="decimal" placeholder="Your answer"><button class="btn" id="taskGo">Check</button><button class="btn sm ghost" id="taskReveal">Show the working</button></div>
      <div class="taskfb"></div></div>`;
    if (task.type === "short") return `<div class="check task"><div class="checklabel">Write it — short answer</div>
      <div class="prompt" style="font-size:17.5px">${esc(task.q)}</div>
      <textarea id="taskIn" rows="4" class="binput" placeholder="One or two full sentences…"></textarea>
      <div class="row" style="margin-top:8px"><button class="btn" id="taskGo">Check</button><button class="btn sm ghost" id="taskReveal">Show the model answer</button></div>
      <div class="taskfb"></div></div>`;
    return "";
  }
  function wireTask(task, onDone) {
    if (!task) return;
    const fb = app.querySelector(".task .taskfb");
    const contHTML = `<div class="actions"><button class="btn" id="continue">Continue</button></div>`;
    const finish = html => { fb.innerHTML = html; const c = fb.querySelector("#continue"); if (c) { c.onclick = onDone; c.focus(); } wireGlossary(); };

    if (task.type === "check" || task.type === "scenario") {
      let misses = 0;
      const reveal = () => {
        const k = task.opts.findIndex(o => o.ok);
        const btns = app.querySelectorAll(".task .choice");
        btns.forEach(x => { x.onclick = null; });
        btns[k].classList.add("right");
        finish(`<div class="sheet good" style="margin-top:12px"><div class="bd">
          <p><b>The answer: ${esc(task.opts[k].t)}.</b></p><p>${esc(task.opts[k].why)}</p>${contHTML}</div></div>`);
      };
      app.querySelectorAll(".task .choice").forEach(b => b.onclick = () => {
        const o = task.opts[+b.dataset.i];
        if (o.ok) {
          app.querySelectorAll(".task .choice").forEach(x => x.onclick = null);
          b.classList.add("right");
          finish(`<div class="sheet good" style="margin-top:12px"><div class="bd">
            <p><b>Exactly.</b> ${esc(o.why)}</p>${contHTML}</div></div>`);
        } else {
          misses++;
          b.classList.add("wrong"); b.onclick = null; b.disabled = true;
          fb.innerHTML = `<div class="sheet mid" style="margin-top:12px"><div class="bd">
            <p><b>Not that one —</b> ${esc(o.why)} <b>Try another.</b></p>
            ${misses >= 2 ? `<div class="actions"><button class="btn sm ghost" id="taskReveal">Show me the answer</button></div>` : ""}</div></div>`;
          const rv = fb.querySelector("#taskReveal"); if (rv) rv.onclick = reveal;
          wireGlossary();
        }
      });
    }

    if (task.type === "calc") {
      const inp = app.querySelector("#taskIn"), go = app.querySelector("#taskGo"), rb = app.querySelector("#taskReveal");
      const revealW = () => {
        go.disabled = true; inp.disabled = true;
        finish(`<div class="sheet good" style="margin-top:12px"><div class="bd">
          <p><b>Answer: ${task.expected}.</b></p><p><b>Working:</b> ${esc(task.working)}</p>${contHTML}</div></div>`);
      };
      if (rb) rb.onclick = revealW;
      const submit = () => {
        const v = parseFloat((inp.value || "").replace(/[$,%\s]/g, ""));
        if (isNaN(v)) return toast("Enter a number first.");
        if (Math.abs(v - task.expected) <= (task.tol == null ? 0.5 : task.tol)) {
          go.disabled = true; inp.disabled = true;
          finish(`<div class="sheet good" style="margin-top:12px"><div class="bd">
            <p><b>Correct.</b></p><p><b>Working:</b> ${esc(task.working)}</p>${contHTML}</div></div>`);
        } else {
          fb.innerHTML = `<div class="sheet mid" style="margin-top:12px"><div class="bd">
            <p><b>Not yet.</b> Check the method and try again — the working is one tap away whenever you want it.</p></div></div>`;
          inp.focus(); if (inp.select) inp.select();
        }
      };
      go.onclick = submit;
      inp.onkeydown = e => { if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); submit(); } };
    }

    if (task.type === "short") {
      const inp = app.querySelector("#taskIn"), go = app.querySelector("#taskGo"), rb = app.querySelector("#taskReveal");
      const terms = task.vocab.map(vm);
      const modelP = `<p><b>Model answer:</b> ${esc(task.model)}</p>`;
      const showModel = () => finish(`<div class="sheet good" style="margin-top:12px"><div class="bd">${modelP}${contHTML}</div></div>`);
      if (rb) rb.onclick = showModel;
      const submit = () => {
        const ans = (inp.value || "").trim();
        if (!ans) return toast("Write anything you can — then check.");
        const low = ans.toLowerCase();
        const hits = terms.filter(t => low.includes(t.t.toLowerCase()));
        const strong = hits.length >= Math.ceil(terms.length * 0.6);
        finish(`<div class="sheet ${strong ? "good" : "mid"}" style="margin-top:12px"><div class="bd">
          <p><b>${strong ? "Strong — the key ideas are there." : "Developing — see what's missing, revise your answer above, and re-check."}</b></p>
          <p class="vhits">key ideas: ${terms.map(t => `<span class="vchip ${hits.includes(t) ? "hit" : "miss"}">${esc(t.d)}</span>`).join("")}</p>
          ${strong ? modelP : ""}
          <div class="actions">
            ${strong ? "" : `<button class="btn sm" id="taskRe">Re-check my revision</button><button class="btn sm ghost" id="taskModel">Show the model</button>`}
            <button class="btn ${strong ? "" : "ghost"}" id="continue">Continue</button>
          </div></div></div>`);
        const re = fb.querySelector("#taskRe"); if (re) re.onclick = submit;
        const sm = fb.querySelector("#taskModel"); if (sm) sm.onclick = showModel;
      };
      go.onclick = submit;
      inp.onkeydown = e => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); e.stopPropagation(); submit(); } };
    }
  }

  function levelPlayer(areaId, lessonId, li, si) {
    const lesson = getLesson(lessonId);
    const level = lesson.levels[li];
    if (si >= level.steps.length) return levelDone(areaId, lessonId, li);
    const st = level.steps[si];
    app.innerHTML = `
      <div class="sessionbar">
        <button class="x" id="quit" title="Levels">←</button>
        <span class="lbl">${esc(level.name)} · ${si + 1} of ${level.steps.length}</span>

      </div>
      <div class="enter">
        <div class="${st.task ? "stepgrid" : ""}">
        <div class="stepmain"><div class="chunk">

        </div></div>
